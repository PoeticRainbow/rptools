plugins {
    id 'java'
}

group = 'io.github.poeticrainbow'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

jar {
    manifest {
        attributes(
                "Main-Class": "io.github.poeticrainbow.rptools.RPTools"
        )
    }
}

test {
    useJUnitPlatform()
}